<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Homologação de Fornecedores — Sumaré</title>
    <!--
      GitHub Pages não tem fallback de SPA: qualquer rota que não seja um
      arquivo real cai neste 404. Reescrevemos o caminho em querystring e
      redirecionamos para o index, que restaura a rota (ver index.html).
      pathSegmentsToKeep = 1 mantém o segmento do project page (/Homologa-o/).
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
